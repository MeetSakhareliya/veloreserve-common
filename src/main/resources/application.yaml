spring:
  application:
    name: reservation-system

  sql:
    init:
      mode: never

  datasource:
    url: jdbc:postgresql://localhost:5432/velo_reserve
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET lock_timeout = '20s'"
      maximum-pool-size: 100
#      connection-timeout: 30000

  jpa:
    defer-datasource-initialization: true
    database-platform=org.hibernate.dialect.PostgreSQLDialect:
    hibernate:
      ddl-auto: update
      format_sql: true
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 20

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true


    distribution:
      percentiles-histogram:
        http:
          server:
            requests=true:
